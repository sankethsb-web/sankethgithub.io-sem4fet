<!DOCTYPE html>
<html>
<body>

<h2>Content Form</h2>

<form action="/action_page.php">
  <label for="fname">Full Name:</label><br>
  <input type="text" id="fname" name="fname" placeholder="Enter your name">
  <br><br>

  <label for="email">Email Address:</label><br>
  <input type="email" id="email" name="email" placeholder="example@mail.com">
  <br><br>

  <label for="Purpose">Choose the purpose:</label><br>
  <select id="Purpose" name="Purpose">
    <option value="Job Opportunities">Job Opportunities</option>
    <option value="General Inquiry">General Inquiry</option>
    <option value="Other">Other</option>
  </select>
  <br><br>

  <label for="message">Message:</label><br>
  <textarea id="message" name="message" rows="10" cols="30" placeholder="Type your message here..."></textarea>
  <br><br>

  <input type="submit" value="Send Message">
</form>

</body>
</html>
